<div class="container">
  <div><h3>Input JSON</h3><textarea id="input" placeholder='Paste JSON here...'></textarea></div>
  <div><h3>Formatted Output</h3><textarea id="output" readonly></textarea></div>
</div>
<div class="actions">
  <button onclick="formatJSON()">Format</button>
  <button class="secondary" onclick="minifyJSON()">Minify</button>
  <button class="secondary" onclick="copyOutput()">Copy</button>
</div>
<script>
function formatJSON(){
  try{
    var v=document.getElementById('input').value.trim();
    if(!v)return;
    var obj=JSON.parse(v);
    document.getElementById('output').value=JSON.stringify(obj,null,2);
    document.getElementById('error')&&document.getElementById('error').remove();
    window.toolbox&&window.toolbox.complete({action:'format',size:v.length});
  }catch(e){
    var d=document.createElement('div');d.className='error';d.id='error';d.textContent='Error: '+e.message;
    document.getElementById('input').parentNode.appendChild(d);
    window.toolbox&&window.toolbox.error(e.message);
  }
}
function minifyJSON(){
  try{
    var v=document.getElementById('input').value.trim();
    if(!v)return;
    var obj=JSON.parse(v);
    document.getElementById('output').value=JSON.stringify(obj);
    window.toolbox&&window.toolbox.complete({action:'minify',size:JSON.stringify(obj).length});
  }catch(e){window.toolbox&&window.toolbox.error(e.message);}
}
function copyOutput(){
  var o=document.getElementById('output');
  navigator.clipboard.writeText(o.value);
}
document.getElementById('input').addEventListener('input',function(){
  try{JSON.parse(this.value);this.style.borderColor='#4ade80';}catch(e){this.style.borderColor='#e94560';}
});
</script>
