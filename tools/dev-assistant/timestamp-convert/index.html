<div class="c"><div class="now" id="now"></div><div class="card"><h3>Timestamp → Date</h3><div class="row"><input type="text" id="ts" placeholder="Enter Unix timestamp (seconds or milliseconds)"><button onclick="ts2date()">Convert</button></div><div class="result" id="tsResult"></div></div><div class="card"><h3>Date → Timestamp</h3><div class="row"><input type="datetime-local" id="dt" style="flex:1;background:#0f0f23;color:#e0e0e0;border:1px solid #333;border-radius:8px;padding:10px;font-size:14px;outline:none"><button onclick="date2ts()">Convert</button></div><div class="result" id="dtResult"></div></div></div><script>function updateNow(){var now=Date.now();document.getElementById('now').textContent='Current: '+Math.floor(now/1000)+' (s) / '+now+' (ms)'}setInterval(updateNow,1000);updateNow();function ts2date(){var v=parseInt(document.getElementById('ts').value);if(isNaN(v)){window.toolbox&&window.toolbox.error('Invalid timestamp');return}if(v<1e12)v=v*1000;var d=new Date(v);var r='UTC: '+d.toUTCString()+'\nLocal: '+d.toLocaleString()+'\nISO: '+d.toISOString()+'\nSeconds: '+Math.floor(v/1000)+'\nMilliseconds: '+v;document.getElementById('tsResult').textContent=r;window.toolbox&&window.toolbox.complete({timestamp:v,date:d.toISOString()})}function date2ts(){var v=document.getElementById('dt').value;if(!v){window.toolbox&&window.toolbox.error('Select a date');return}var d=new Date(v);var s=Math.floor(d.getTime()/1000);var ms=d.getTime();document.getElementById('dtResult').textContent='Seconds: '+s+'\nMilliseconds: '+ms;window.toolbox&&window.toolbox.complete({timestamp:ms,date:d.toISOString()})}document.getElementById('dt').value=new Date().toISOString().slice(0,16)</script>
