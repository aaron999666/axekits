-digit',hour12:false,timeZoneName:'short'}).format(fromFmt);document.getElementById('result').textContent=toFmt2;var fromOffset=getOffset(fromFmt,from);var toOffset=getOffset(fromFmt,to);var diff=(toOffset-fromOffset)/60;var sign=diff>=0?'+':'';document.getElementById('diff').textContent=from.replace(/_/g,' ')+' → '+to.replace(/_/g,' ')+' = '+sign+diff+' hours';window.toolbox&&window.toolbox.complete({from:from,to:to,diff:diff})}catch(e){document.getElementById('result').textContent='Error';window.toolbox&&window.toolbox.error(e.message)}}function toFmt(date,from,to){return date}function getOffset(date,tz){var utcStr=date.toLocaleString('en-US',{timeZone:'UTC'});var tzStr=date.toLocaleString('en-US',{timeZone:tz});return(new Date(tzStr)-new Date(utcStr))/60000}init()</script>
