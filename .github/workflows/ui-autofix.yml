name: Tool UI Auto-Fix

on:
  workflow_dispatch:

concurrency:
  group: ui-autofix-main
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  normalize-tool-ui:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Auto inject unified shell
        run: node packages/tool-shell/inject.js tools

      - name: Verify UI consistency
        run: python scripts/ui_consistency_check.py

      - name: Package normalized UI assets
        run: |
          tar -czf ui-autofix-assets.tgz tools
      - name: Upload normalized UI assets
        uses: actions/upload-artifact@v4
        with:
          name: ui-autofix-assets
          path: ui-autofix-assets.tgz
          if-no-files-found: error
