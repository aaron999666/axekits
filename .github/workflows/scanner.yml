name: Tool Data Automation

on:
  workflow_dispatch:

concurrency:
  group: scanner-main
  cancel-in-progress: false

jobs:
  scan-and-classify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt
      - name: Competitor benchmark first
        run: python scripts/competitor_benchmark.py
      - name: Scan GitHub repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/scanner.py
      - name: Demand discovery
        run: python scripts/demand_discovery.py
      - name: Auto tool factory
        run: python scripts/auto_tool_factory.py
      - name: Classify with AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: python scripts/classifier.py
      - name: Auto pricing engine
        run: python scripts/pricing_engine.py
      - name: Generate web SEO assets
        run: python scripts/generate_web_seo_assets.py
      - name: Security gate
        run: python scripts/security_gate.py
      - name: Translate to Chinese
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/translator.py
      - name: Health check
        run: python scripts/health_check.py
      - name: Validate output
        run: python scripts/validate.py
      - name: Inject tool shell
        run: node packages/tool-shell/inject.js tools
      - name: UI consistency check
        run: python scripts/ui_consistency_check.py
      - name: Package generated assets
        run: |
          tar -czf scanner-assets.tgz data tools
      - name: Upload generated assets
        uses: actions/upload-artifact@v4
        with:
          name: scanner-assets
          path: scanner-assets.tgz
          if-no-files-found: error
